name: "버그 리포트 / 개선 제안"
description: "밈 표현이 부자연스럽거나 플러그인에 문제가 있을 때"
title: "[버그] "
labels: ["bug"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 유형
      options:
        - "밈 표현이 부자연스러움"
        - "밈 정보가 틀림 (유래, 표현 등)"
        - "플러그인 동작 오류"
        - "기타"
    validations:
      required: true

  - type: input
    id: meme-id
    attributes:
      label: 관련 밈 (해당 시)
      placeholder: "예: kim-dong-hyun"

  - type: textarea
    id: description
    attributes:
      label: 설명
      description: "어떤 문제인지 자세히 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 개선 제안 (선택)
      description: "어떻게 고치면 좋을지 의견이 있으면 적어주세요"
