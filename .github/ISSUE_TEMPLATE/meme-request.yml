name: "밈 추가 요청"
description: "새로운 한국 밈을 k-meme에 추가해주세요"
title: "[밈 요청] "
labels: ["meme-request"]
body:
  - type: input
    id: meme-name
    attributes:
      label: 밈 이름
      description: "밈의 이름 (인물명, ~체 등)"
      placeholder: "예: 곽철용 말투"
    validations:
      required: true

  - type: input
    id: meme-origin
    attributes:
      label: 출처
      description: "밈의 출처 (드라마, 유튜브, 예능 등)"
      placeholder: "예: 영화 '타짜' 곽철용 캐릭터"
    validations:
      required: true

  - type: textarea
    id: speech-pattern
    attributes:
      label: 말투 특징
      description: "이 밈의 말투가 어떤 특징이 있는지 설명해주세요"
      placeholder: |
        예:
        - 도박/게임 용어를 일상에 적용
        - "묻고 더블로 가!" 같은 베팅 화법
        - 짧고 단호한 문장
    validations:
      required: true

  - type: textarea
    id: example-expressions
    attributes:
      label: 대표 표현 (3개 이상)
      description: "이 밈에서 자주 사용되는 표현들"
      placeholder: |
        1. "묻고 더블로 가!"
        2. "니가 뭔데 반말이야"
        3. "돈이 최고야"
    validations:
      required: true

  - type: textarea
    id: conversion-example
    attributes:
      label: 변환 예시 (선택)
      description: "일상 문장을 이 밈 스타일로 바꾼 예시가 있으면 적어주세요"
      placeholder: |
        입력: "이 코드 좀 고쳐야 할 것 같아요"
        출력: "이 코드? 묻고 더블로 가. 전부 리팩토링이야."

  - type: dropdown
    id: familiarity
    attributes:
      label: 인지도
      description: "이 밈이 얼마나 널리 알려져 있나요?"
      options:
        - "대부분의 한국인이 안다"
        - "인터넷 유저라면 안다"
        - "특정 커뮤니티에서 유명하다"
    validations:
      required: true
